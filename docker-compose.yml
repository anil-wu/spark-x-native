services:
  service:
    build:
      context: ./service
      dockerfile: Dockerfile
    image: sparkplay-service:local
    container_name: sparkplay-service
    restart: unless-stopped
    ports:
      - "${SERVICE_PORT:-6001}:8890"
    environment:
      - MYSQL_DSN=sparkplay:sparkplay@tcp(mysql:3306)/sparkplay?charset=utf8mb4&parseTime=true&loc=Local
      - SPARKX_SUPER_USER={"email":"abluysky@gmail.com","password":"111111","username":"abluysky"}
      - AUTH_ACCESS_SECRET=dev-user-secret
      - ADMIN_AUTH_ACCESS_SECRET=dev-admin-secret
      - STORAGE_PROVIDER=s3
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_ACCESS_KEY_SECRET=minioadmin
      - S3_BUCKET=sparkplay
      - S3_REGION=us-east-1
      - S3_USE_SSL=false
    command: ["-f", "/app/etc/sparkx-api-dev.yaml"]
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_started
  opencode:
    build: ./opencode
    image: sparkplay-opencode:local
    container_name: opencode-service
    entrypoint: ["/opt/start-all.sh"]
    working_dir: /workspace
    ports:
      - "4096:4096"
      - "7070:7070"
    volumes:
      - ./opencode/workspace:/workspace
      - ./opencode/opencode.json:/workspace/opencode.json:ro
      - ./opencode/.opencode:/workspace/.opencode
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENCODE_CONFIG=/workspace/opencode.json
      - OPENCODE_CONFIG_PATH=/workspace/opencode.json
      - SPARKX_API_BASE_URL=https://service:8890
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - BUN_TLS_REJECT_UNAUTHORIZED=0
      - OPENCODE_WORKSPACE_DIR=/workspace
    restart: unless-stopped
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: sparkplay-web:local
    container_name: sparkplay-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - SPARKX_API_BASE_URL=https://service:8890
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - SESSION_SECRET=${SESSION_SECRET:-dev-session-secret-change-me}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-2592000}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - NEXT_PUBLIC_OPENCODE_BASE_URL=http://opencode-service:4096
      - NEXT_PUBLIC_OPENCODE_WORKSPACE_MGR_BASE_URL=http://opencode-service:7070
    depends_on:
      - service
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.4}
    command: --bind-address=0.0.0.0
    container_name: sparkplay-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sparkplay
      MYSQL_USER: sparkplay
      MYSQL_PASSWORD: sparkplay
      MYSQL_ROOT_PASSWORD: sparkplay
    ports:
      - "${MYSQL_PORT:-6003}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./service/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: sparkplay-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: sparkplay-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-sparkplay}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb -p "local/$$S3_BUCKET" || true
        mc anonymous set none "local/$$S3_BUCKET" || true
        exit 0

volumes:
  mysql_data:
  minio_data:
